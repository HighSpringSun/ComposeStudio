<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7F52FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C711E1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#E0D0FF;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B794F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D946EF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: Background rounded square -->
  <rect x="20" y="20" width="160" height="160" rx="32" ry="32" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Icon: Subtle grid pattern -->
  <g opacity="0.08">
    <line x1="72" y1="35" x2="72" y2="165" stroke="#FFFFFF" stroke-width="0.75"/>
    <line x1="100" y1="35" x2="100" y2="165" stroke="#FFFFFF" stroke-width="0.75"/>
    <line x1="128" y1="35" x2="128" y2="165" stroke="#FFFFFF" stroke-width="0.75"/>
    <line x1="35" y1="72" x2="165" y2="72" stroke="#FFFFFF" stroke-width="0.75"/>
    <line x1="35" y1="100" x2="165" y2="100" stroke="#FFFFFF" stroke-width="0.75"/>
    <line x1="35" y1="128" x2="165" y2="128" stroke="#FFFFFF" stroke-width="0.75"/>
  </g>

  <!-- Icon: Compose layers -->
  <g transform="translate(100, 110)" opacity="0.5">
    <polygon points="0,-24 32,0 0,24 -32,0" fill="#FFFFFF" opacity="0.3"/>
  </g>
  <g transform="translate(100, 100)" opacity="0.7">
    <polygon points="0,-24 32,0 0,24 -32,0" fill="#FFFFFF" opacity="0.4"/>
  </g>
  <g transform="translate(100, 90)" filter="url(#innerGlow)">
    <polygon points="0,-26 34,0 0,26 -34,0" fill="url(#codeGrad)" opacity="0.9"/>
  </g>

  <!-- Icon: Code brackets -->
  <g transform="translate(100, 88)">
    <path d="M-10,-8 L-18,0 L-10,8" fill="none" stroke="#7F52FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10,-8 L18,0 L10,8" fill="none" stroke="#7F52FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="3" y1="-7" x2="-3" y2="7" stroke="#C711E1" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Icon: Multiplatform dots -->
  <g transform="translate(100, 50)">
    <circle cx="-22" cy="0" r="3" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="-11" cy="0" r="3" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="0" cy="0" r="3" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="11" cy="0" r="3" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="22" cy="0" r="3" fill="#FFFFFF" opacity="0.9"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#FFFFFF" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Icon: Cursor -->
  <g transform="translate(135, 65)" opacity="0.85">
    <path d="M0,0 L0,10 L3,8 L5,12 L7,11 L5,7 L9,7 Z" fill="#FFFFFF" stroke="#7F52FF" stroke-width="0.6"/>
  </g>

  <!-- Text: "Compose" -->
  <text x="210" y="112" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="url(#textGrad)" letter-spacing="-1">Compose</text>

  <!-- Text: "Studio" -->
  <text x="498" y="112" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="300" fill="#C0C0D0" letter-spacing="-1">Studio</text>

  <!-- Tagline -->
  <text x="212" y="142" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#6B6B80" letter-spacing="3">VISUAL UI DESIGNER FOR COMPOSE MULTIPLATFORM</text>
</svg>
